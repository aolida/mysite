<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网站建设中</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Microsoft YaHei", sans-serif;
            background: #f5f7fa;
            color: #333;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 15px;
            color: #2c3e50;
        }
        p {
            font-size: 18px;
            color: #7f8c8d;
            line-height: 1.6;
        }
        .tip {
            margin-top: 30px;
            font-size: 16px;
            color: #95a5a6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>欢迎光临！</h1>
        <p>网站正在重新建设中，很快就会与大家见面～</p>
        <div class="tip">感谢您的耐心等待 😊</div>
    </div>
</body>
</html>
